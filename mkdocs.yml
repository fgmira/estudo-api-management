site_name: Estudo API Management
site_description: Documentação de estudos sobre API Management
site_author: Fabio
repo_url: https://github.com/fgmira/estudo-api-management
repo_name: fgmira/estudo-api-management

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Inter
    code: Fira Code
  features:
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fgmira/estudo-api-management

copyright: Copyright &copy; 2026 Fabio Mira

plugins:
  - search
  - panzoom

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      linenums_style: pymdownx-inline
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.esm.min.mjs

