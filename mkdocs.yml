site_name: Estudo API Management
site_description: Documentação de estudos sobre API Management
site_author: Fabio

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.esm.min.mjs

nav:
  - Home: index.md
  - Módulo 1 — Fundamentos:
    - Visão Geral: modulo-1-fundamentos/index.md
    - 1.1 O que é uma API: modulo-1-fundamentos/cap_1_1_o_que_e_uma_api.md
    - 1.2 API como Produto: modulo-1-fundamentos/cap_1_2_api_como_produto.md
    - 1.3 Governança de API — Conceitos: modulo-1-fundamentos/cap_1_3__governanca_de_api_conceitos.md
    - 1.4 Diferença entre Gerenciamento e Governança: modulo-1-fundamentos/cap_1_4_diferenca_gerenciamento_governanca.md
    - 1.5 Os Três Planos — Controle, Dados e Observabilidade: modulo-1-fundamentos/cap_1_5_tres_planos.md
    - 1.6 Estilos arquiteturais e suas implicações de governança: modulo-1-fundamentos/cap_1_6_estilos_arquiteturais.md
    - 1.7 Heterogeneidade de infraestrutura e governança multi-ambiente: modulo-1-fundamentos/cap_1_7_heterogeneidade.md
  - Módulo 2 — Ciclo de Vida de APIs:
    - Visão Geral: modulo-2-ciclo-de-vida/index.md
    - 2.1 As Fases do Ciclo de Vida: modulo-2-ciclo-de-vida/cap_2_1_ciclo_vida.md
    - 2.2 Design-first vs. Code-first: modulo-2-ciclo-de-vida/cap_2_2_design_code.md
    - 2.3 Contratos de API — OpenAPI, AsyncAPI e gRPC: modulo-2-ciclo-de-vida/cap_2_3_contratos.md
    - 2.4 Documentação de APIs: modulo-2-ciclo-de-vida/cap_2_4_documentacao.md
  - Módulo 3 — Governança de APIs: modulo-3-governanca/index.md
  - Módulo 4 — ITIL & APIs: modulo-4-itil/index.md
  - Módulo 5 — Segurança de APIs: modulo-5-seguranca/index.md
  - Módulo 6 — Maturidade de APIs: modulo-6-maturidade/index.md
  - Módulo 7 — Ferramentas & Padrões: modulo-7-ferramentas/index.md
